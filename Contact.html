<div class="CONTACT">
<mark style="font-size: 50px ; background-color: #f3eee9"> Interested? Contact me!</mark>
<center>
      <form class="contact-form">
         <br><label for="name">Full Name</label> <br>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required><br>
        <br>
        <label for="email">Email Address</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br>
        <br>
        <label for="message">Message</label><br>
        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea><br>
        <br>
        <button type="submit" class="btn">Send</button>
      </form>
</center>
</div>
